services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  basket-api:
    build:
      context: .
      dockerfile: src/Services/Basket/Ecommerce.BasketService.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Compose
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__BasketDb: Host=postgres;Port=5432;Database=basketdb;Username=ecommerce;Password=ecommerce
      ConnectionStrings__Redis: redis:6379
      MessageBroker__Host: rabbitmq
    ports:
      - "5020:8080"
    depends_on:
      - postgres
      - rabbitmq
      - redis

  order-api:
    build:
      context: .
      dockerfile: src/Services/Order/Ecommerce.OrderService.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Compose
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__OrderDb: Host=postgres;Port=5432;Database=orderdb;Username=ecommerce;Password=ecommerce
      MessageBroker__Host: rabbitmq
    ports:
      - "5030:8080"
    depends_on:
      - postgres
      - rabbitmq

  logistics-api:
    build:
      context: .
      dockerfile: src/Services/Logistics/Ecommerce.LogisticsService.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Compose
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__LogisticsDb: Host=postgres;Port=5432;Database=logisticsdb;Username=ecommerce;Password=ecommerce
      MessageBroker__Host: rabbitmq
    ports:
      - "5040:8080"
    depends_on:
      - postgres
      - rabbitmq

  gateway:
    build:
      context: .
      dockerfile: src/Gateway/Ecommerce.Gateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Compose
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5010:8080"
    depends_on:
      - basket-api
      - order-api
      - logistics-api

  prometheus:
    image: prom/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - gateway

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres-data:
