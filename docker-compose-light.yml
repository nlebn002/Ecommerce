services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
      POSTGRES_DB: ecommerce
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  rabbitmq:
    image: rabbitmq:4-management
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    ports:
      - "5672:5672"
      - "15672:15672"

  basket-api:
    build:
      context: .
      dockerfile: src/Services/Basket/Ecommerce.BasketService.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Compose
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__BasketDb: Host=postgres;Port=5432;Database=basketdb;Username=ecommerce;Password=ecommerce
      ConnectionStrings__MessageBroker: rabbitmq://guest:guest@rabbitmq:5672
    ports:
      - "5020:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  order-api:
    build:
      context: .
      dockerfile: src/Services/Order/Ecommerce.OrderService.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Compose
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__OrderDb: Host=postgres;Port=5432;Database=orderdb;Username=ecommerce;Password=ecommerce
      ConnectionStrings__MessageBroker: rabbitmq://guest:guest@rabbitmq:5672
    ports:
      - "5030:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  logistics-api:
    build:
      context: .
      dockerfile: src/Services/Logistics/Ecommerce.LogisticsService.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Compose
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__LogisticsDb: Host=postgres;Port=5432;Database=logisticsdb;Username=ecommerce;Password=ecommerce
      ConnectionStrings__MessageBroker: rabbitmq://guest:guest@rabbitmq:5672
    ports:
      - "5040:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: src/Gateway/Ecommerce.Gateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Compose
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5010:8080"
    depends_on:
      - basket-api
      - order-api
      - logistics-api

volumes:
  postgres-data:
