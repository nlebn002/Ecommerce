global:
  scrape_interval: 15s

scrape_configs:
  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: basket-api
    metrics_path: /metrics
    static_configs:
      - targets: ["basket-api:8080"]

  - job_name: order-api
    metrics_path: /metrics
    static_configs:
      - targets: ["order-api:8080"]

  - job_name: logistics-api
    metrics_path: /metrics
    static_configs:
      - targets: ["logistics-api:8080"]
